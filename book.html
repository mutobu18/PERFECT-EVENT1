<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now - Perfect Event</title>
    <link rel="stylesheet" href="CSS/index.css">
    <link rel="stylesheet" href="CSS/book.css">
</head>

<body>


<header id="header-section">

    <div class="logo">
        PERFECT EVENT
    </div>

    <nav id="nav-buttons">
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="services.html">SERVICES</a></li>
            <li><a href="feedback.html">FEEDBACK</a></li>
            <li><a href="book.html" class="active book-btn">BOOK NOW</a></li>
        </ul>
    </nav>

</header>


<section class="book-section">

    <h2>Book Your Event</h2>

    <!-- the action attribute specifies where to send the form data when the form is submitted -->
     <!--the method attribute specifies the HTTP method to use when sending form data -->

    <form class="book-form" action="booking-form.php" method="POST">

        <input type="text" placeholder="Full Name" name="fullName" required>

        <input type="email" placeholder="Email Address" name="email" required>

        <input type="tel" placeholder="Phone Number" name="phone" required>
        <!-- we use the required attribute to make the inputs fields mandatory -->
        <select  required>
            <option value="">Select Event Type</option>
            <option>Wedding</option>
            <option>Birthday</option>
            <option>Corporate Event</option>
            <option>Private Party</option>
        </select>

        <input type="date"  required>

        <textarea placeholder="Event Details (Location, Guests, etc...)" name="eventDetails" rows="5"></textarea>

        <button type="submit">Confirm Booking</button>

    </form>

</section>

</body>
</html>
